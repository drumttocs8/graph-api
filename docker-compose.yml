version: "3.8"

services:
  graph-api:
    build: .
    ports:
      - "8083:8083"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=verance-ai-dev
      - PORT=8083
    networks:
      - verance-network
    depends_on:
      - neo4j

  neo4j:
    build: ../neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/verance-ai-dev
    volumes:
      - neo4j-data:/data
    networks:
      - verance-network

networks:
  verance-network:
    driver: bridge

volumes:
  neo4j-data:
